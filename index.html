<!-- ============================================================
     index.html — 前端入口 HTML 文件
     功能：Vue 3 SPA 的 HTML 容器
     学习重点：Vite 构建的入口约定，<div id="app"> 挂载点
     ============================================================ -->

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />                                      <!-- 字符编码 UTF-8 -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />    <!-- 网站图标 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <!-- 移动端视口适配 -->
    <title>jyoushitou</title>                                     <!-- 网页标题 -->
  </head>
  <body>
    <div id="app"></div>                                          <!-- Vue 挂载点：所有内容渲染到此 div 内 -->
    <script type="module" src="/src/main.js"></script>            <!-- ES Module 方式引入主入口 JS -->
  </body>
</html>
