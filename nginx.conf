# ============================================================
# nginx.conf — Vue 应用 Nginx 配置（生产环境）
# ============================================================
# 功能说明：
#   1. 提供 Vue SPA 的静态文件服务
#   2. SPA 路由重写（解决刷新 404 问题）
#   3. API 请求代理转发到后端
#   4. 静态资源缓存策略
#
# 部署方式：
#   Docker 部署：此文件被 Dockerfile 复制到 /etc/nginx/conf.d/default.conf
#   宿主机部署：复制到 nginx 配置目录后重启
#
# 注意事项：
#   后端地址 backend:60906 是 Docker Compose 内部网络的服务名
#   如果后端不在容器内，需改为宿主机 IP 或 host.docker.internal
# ============================================================

server {
    # ===== 监听配置 =====
    listen       80;                    # 监听容器内 80 端口
    server_name  localhost;             # 服务器名称

    # ===== DNS 解析器 =====
    # 用于 proxy_pass 中使用变量时动态解析主机名
    # 避免 Nginx 启动时因 backend 不存在而崩溃退出
    resolver 127.0.0.11 valid=30s;

    # ================================================================
    # Vue SPA 路由配置（核心！）
    # ================================================================
    # Vue 是单页应用（SPA），所有路由都是前端 history 模式
    # 用户直接访问 /about、/user/123 等路径时，服务器需要返回
    # index.html，由 Vue Router 解析路由并渲染对应组件
    # 如果不配置，刷新页面会报 404 Not Found
    # ================================================================
    location / {
        root   /usr/share/nginx/html;   # 静态文件根目录（Dockerfile 中已 COPY）
        index  index.html index.htm;    # 默认首页文件
        try_files $uri $uri/ /index.html;  # ★ 核心：匹配不到文件就返回 index.html
    }

    # ================================================================
    # API 代理配置
    # ================================================================
    # 将前端 /api/* 的请求转发到后端 C++ 服务
    # 这样前端代码中请求 /api/xxx 即可，无需写完整后端地址
    #
    # 后端地址说明：
    #   Docker 部署：backend:60906（容器名:端口，通过内部网络）
    #   宿主机部署：将 backend 改为 host.docker.internal 或宿主机 IP
    #
    # ★ 使用变量 $backend_url 的原因：
    #   如果直接用 proxy_pass http://backend:60906，Nginx 启动时
    #   会强制解析 backend 主机名，找不到就直接崩溃退出。
    #   用变量后，Nginx 启动时不解析，只在请求到达时动态解析，
    #   即使 backend 暂时不存在，Nginx 也能正常启动。
    # ================================================================
    # 定义后端地址变量（使用 resolver 实现动态解析）
    set $backend_url http://10.9.6.28:60906;

    location /api {
        # 代理转发目标地址（使用变量，避免启动时强制解析）
        proxy_pass $backend_url;

        # 传递原始请求头，让后端获取真实客户端信息
        proxy_set_header Host $host;                     # 原始 Host
        proxy_set_header X-Real-IP $remote_addr;         # 客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链 IP
        proxy_set_header X-Forwarded-Proto $scheme;      # 请求协议（http/https）

        # 超时配置
        proxy_connect_timeout 60s;   # 连接后端超时（秒）
        proxy_read_timeout 60s;      # 读取后端响应超时（秒）
    }

    # ================================================================
    # 静态资源缓存策略
    # ================================================================
    # 对常见的静态资源文件（JS、CSS、图片、字体等）启用强缓存
    # 这些文件通常带有内容哈希（如 app.a1b2c3.js），更新后文件名变化
    # 所以可以放心设置长时间缓存（30 天）
    # ================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html;                    # 静态文件根目录
        expires 30d;                                     # 缓存有效期 30 天
        add_header Cache-Control "public, immutable";    # 强制缓存，禁止重新验证
    }
}
